name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore

      - name: Run test harness
        run: dotnet run --project tests/FsFlow.Tests/FsFlow.Tests.fsproj --nologo

      - name: Run main example
        run: dotnet run --project examples/FsFlow.Examples/FsFlow.Examples.fsproj --nologo

      - name: Run maintenance example
        run: dotnet run --project examples/FsFlow.MaintenanceExamples/FsFlow.MaintenanceExamples.fsproj --nologo

      - name: Publish and run NativeAOT probe
        run: bash scripts/run-aot-probe.sh

      - name: Pack library
        run: dotnet pack src/FsFlow/FsFlow.fsproj --configuration Release --output artifacts/package

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore

      - name: Build API docs
        run: bash scripts/generate-api-docs.sh

      - name: Prepare Pages artifact
        run: touch output/.nojekyll

      - name: Upload generated docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: output/
          if-no-files-found: error

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - verify
      - docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
